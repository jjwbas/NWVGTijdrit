name: Deploy Blazor WASM to GitHub Pages

on:
  # Trigger bij push naar main branch
  push:
    branches: [ main, master ]
  # Handmatig triggeren mogelijk
  workflow_dispatch:

# Permissies voor GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Voorkom gelijktijdige deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and Publish
        run: dotnet publish -c Release -o release

      - name: Update base href for GitHub Pages
        run: |
          REPO_NAME=$(echo ${{ github.repository }} | cut -d'/' -f2)
          sed -i "s|<base href=\"/\" />|<base href=\"/${REPO_NAME}/\" />|g" release/wwwroot/index.html
          # Fix service worker base path
          sed -i "s|const base = \"/\";|const base = \"/${REPO_NAME}/\";|g" release/wwwroot/service-worker.published.js

      - name: Add .nojekyll file
        run: touch release/wwwroot/.nojekyll

      - name: Create 404.html for SPA routing
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'release/wwwroot'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
